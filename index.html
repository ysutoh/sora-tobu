<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#7ec8f2">
<title>そらを とぶ</title>
<style>
  :root{
    --sky-top:#7ec8f2;
    --sky-bottom:#cdeafc;
    --sun:#ffd45e;
    --btn:#ffc24a;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;font-family:'Hiragino Maru Gothic ProN','Hiragino Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
  body{
    background:linear-gradient(180deg,var(--sky-top) 0%,#a9dbf6 45%,var(--sky-bottom) 100%);
    user-select:none;-webkit-user-select:none;touch-action:none;
  }
  #app{position:fixed;inset:0;}

  /* カメラは判定用に隠して使う */
  video{position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;}
  canvas#work{display:none;}

  /* 雲 */
  .cloud{
    position:absolute;background:#fff;border-radius:100px;opacity:.92;
    filter:blur(.5px);will-change:transform;
  }
  .cloud::before,.cloud::after{content:"";position:absolute;background:#fff;border-radius:50%;}

  /* 主人公（子ども＋つばさ） */
  #hero{
    position:absolute;left:50%;top:60%;width:140px;height:140px;
    transform:translate(-50%,-50%);will-change:transform;z-index:5;
    transition:filter .2s;
  }
  #hero svg{width:100%;height:100%;overflow:visible;display:block;}
  .wing{transform-origin:center;transition:transform .12s ease-out;}

  /* あつめる星 */
  .star{position:absolute;width:64px;height:64px;z-index:4;will-change:transform;}
  .star svg{width:100%;height:100%;filter:drop-shadow(0 4px 6px rgba(255,180,0,.4));}

  /* HUD */
  #hud{
    position:absolute;top:env(safe-area-inset-top,16px);left:0;right:0;
    display:flex;justify-content:center;gap:10px;z-index:20;
    padding-top:14px;pointer-events:none;
  }
  .pill{
    background:rgba(255,255,255,.85);border-radius:999px;
    padding:10px 22px;font-size:26px;font-weight:800;color:#3a7bb5;
    box-shadow:0 4px 0 rgba(120,170,210,.35);display:flex;align-items:center;gap:8px;
  }

  /* はばたきメーター */
  #flap-meter{
    position:absolute;left:50%;bottom:calc(env(safe-area-inset-bottom,18px) + 22px);
    transform:translateX(-50%);width:62%;max-width:340px;height:20px;
    background:rgba(255,255,255,.55);border-radius:999px;overflow:hidden;z-index:20;
    box-shadow:0 3px 0 rgba(120,170,210,.3);
  }
  #flap-fill{height:100%;width:0%;border-radius:999px;
    background:linear-gradient(90deg,#ffd45e,#ff9d3c);transition:width .12s;}

  /* オーバーレイ共通 */
  .screen{
    position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;
    padding:32px;z-index:50;
  }
  .screen h1{
    font-size:64px;font-weight:900;color:#1a5ca8;letter-spacing:2px;
    text-shadow:0 3px 0 rgba(255,255,255,.8),0 6px 12px rgba(100,160,220,.35);
    margin-bottom:6px;line-height:1.1;
  }
  .screen p{
    font-size:26px;font-weight:700;color:#1a4a80;line-height:1.7;
    text-shadow:0 1px 4px rgba(255,255,255,.7);max-width:520px;margin:14px 0 30px;
  }
  .bigbtn{
    border:0;cursor:pointer;font-family:inherit;
    font-size:38px;font-weight:900;color:#fff;
    background:linear-gradient(180deg,#ffcf52,#ff9f2e);
    padding:24px 64px;border-radius:999px;
    box-shadow:0 9px 0 #e3851c,0 14px 18px rgba(180,110,20,.35);
    transition:transform .08s,box-shadow .08s;
  }
  .bigbtn:active{transform:translateY(6px);box-shadow:0 3px 0 #e3851c,0 6px 10px rgba(180,110,20,.35);}
  .note{font-size:20px;color:#1a5080;opacity:.9;margin-top:26px;line-height:1.6;font-weight:600;text-shadow:0 1px 3px rgba(255,255,255,.6);}
  .hidden{display:none!important;}

  /* スコアの大きな表示 */
  #result-num{font-size:120px;font-weight:900;color:#1a5ca8;
    text-shadow:0 4px 0 rgba(255,255,255,.8),0 8px 16px rgba(100,160,220,.35);margin:4px 0 4px;}

  /* 開始カウントダウン */
  #count{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-size:200px;font-weight:900;color:#1a5ca8;z-index:40;
    text-shadow:0 6px 0 rgba(255,255,255,.8),0 12px 20px rgba(100,160,220,.4);pointer-events:none;
  }

  /* きらきら（取得エフェクト） */
  .pop{position:absolute;font-size:40px;font-weight:900;color:#fff;
    z-index:30;pointer-events:none;text-shadow:0 3px 0 rgba(255,170,0,.6);
    animation:popup 1s ease-out forwards;}
  @keyframes popup{
    0%{transform:translateY(0) scale(.6);opacity:0;}
    20%{opacity:1;transform:translateY(-10px) scale(1.15);}
    100%{transform:translateY(-70px) scale(1);opacity:0;}
  }
  @keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}}
</style>
</head>
<body>
<div id="app">
  <video id="cam" playsinline muted></video>
  <canvas id="work" width="160" height="120"></canvas>

  <!-- HUD -->
  <div id="hud" class="hidden">
    <div class="pill">⭐ <span id="score">0</span></div>
    <div class="pill">⏱ <span id="time">40</span></div>
  </div>
  <div id="flap-meter" class="hidden"><div id="flap-fill"></div></div>

  <!-- 主人公 -->
  <div id="hero">
    <svg viewBox="0 0 140 140">
      <!-- 左つばさ -->
      <g class="wing wing-l">
        <path d="M68 70 C 38 52, 8 56, 2 78 C 26 74, 48 78, 66 86 Z"
              fill="#fff7d6" stroke="#ffcf52" stroke-width="3" stroke-linejoin="round"/>
      </g>
      <!-- 右つばさ -->
      <g class="wing wing-r">
        <path d="M72 70 C 102 52, 132 56, 138 78 C 114 74, 92 78, 74 86 Z"
              fill="#fff7d6" stroke="#ffcf52" stroke-width="3" stroke-linejoin="round"/>
      </g>
      <!-- からだ -->
      <ellipse cx="70" cy="86" rx="20" ry="24" fill="#6fc3f0" stroke="#4a9fd6" stroke-width="3"/>
      <!-- あたま -->
      <circle cx="70" cy="52" r="22" fill="#ffe0bd" stroke="#e9b487" stroke-width="3"/>
      <!-- かみ -->
      <path d="M48 50 C 50 30, 90 30, 92 50 C 86 42, 54 42, 48 50 Z" fill="#5a3a2a"/>
      <!-- め -->
      <circle cx="62" cy="53" r="3.4" fill="#3a2a1a"/>
      <circle cx="78" cy="53" r="3.4" fill="#3a2a1a"/>
      <!-- ほっぺ -->
      <circle cx="58" cy="60" r="4" fill="#ffb3b3" opacity=".7"/>
      <circle cx="82" cy="60" r="4" fill="#ffb3b3" opacity=".7"/>
      <!-- くち -->
      <path d="M64 63 Q 70 69 76 63" stroke="#c8743e" stroke-width="2.6"
            fill="none" stroke-linecap="round"/>
    </svg>
  </div>

  <!-- スタート画面 -->
  <div id="start" class="screen">
    <h1>そらを とぶ</h1>
    <p>カメラの まえで うでを おおきく ひろげて、<br>ぱたぱた うごかすと そらへ とんでいくよ！</p>
    <button class="bigbtn" id="start-btn">はじめる</button>
    <div class="note" id="cam-note">はじめると カメラの きょかが でるよ。<br>「ゆるす」を おしてね。</div>
  </div>

  <!-- エラー画面 -->
  <div id="error" class="screen hidden">
    <h1>あれれ？</h1>
    <p id="error-msg">カメラが つかえないみたい。<br>カメラの きょかを かくにんしてね。</p>
    <button class="bigbtn" id="retry-btn">もういちど</button>
  </div>

  <!-- カウントダウン -->
  <div id="count" class="hidden"></div>

  <!-- けっか画面 -->
  <div id="result" class="screen hidden">
    <h1>とべたね！</h1>
    <div id="result-num">0</div>
    <p>こ ほしを あつめたよ！</p>
    <button class="bigbtn" id="again-btn">もういちど</button>
  </div>
</div>

<script>
(() => {
  "use strict";

  const $ = id => document.getElementById(id);
  const app = $("app");
  const cam = $("cam");
  const work = $("work");
  const wctx = work.getContext("2d", { willReadFrequently: true });

  const startScreen = $("start");
  const errorScreen = $("error");
  const resultScreen = $("result");
  const countEl = $("count");
  const hud = $("hud");
  const flapMeter = $("flap-meter");
  const flapFill = $("flap-fill");
  const scoreEl = $("score");
  const timeEl = $("time");
  const resultNum = $("result-num");

  let stream = null;
  let prevFrame = null;
  let running = false;
  let score = 0;
  let timeLeft = 40;
  let timerId = null;

  // ヒーローの位置（画面比率 0〜1）
  let heroX = 0.5, heroY = 0.62;
  let velY = 0, velX = 0;  // 速さ
  let lift = 0;             // はばたきによる上昇エネルギー
  let tilt = 0;             // 左右の傾き（演出用）
  let horzBias = 0;         // カメラ左右差（-1=左, +1=右）

  // ===== 雲を配置 =====
  function makeClouds() {
    document.querySelectorAll(".cloud").forEach(c => c.remove());
    const W = innerWidth, H = innerHeight;
    for (let i = 0; i < 6; i++) {
      const c = document.createElement("div");
      c.className = "cloud";
      const w = 120 + Math.random() * 160;
      const h = w * 0.42;
      c.style.width = w + "px";
      c.style.height = h + "px";
      c.style.left = (Math.random() * W) + "px";
      c.style.top = (Math.random() * H) + "px";
      c.style.opacity = 0.55 + Math.random() * 0.35;
      c.dataset.speed = 0.15 + Math.random() * 0.35;
      // ふくらみ
      c.style.boxShadow =
        `${w*0.22}px ${-h*0.35}px 0 ${-h*0.05}px #fff,
         ${-w*0.20}px ${-h*0.20}px 0 ${-h*0.02}px #fff`;
      app.appendChild(c);
    }
  }

  function drawStarSVG() {
    return `<svg viewBox="0 0 24 24"><path fill="#ffd24a" stroke="#ffae00" stroke-width="1.2"
      d="M12 1.6l2.9 6.1 6.7.9-4.9 4.6 1.2 6.6L12 17.7 6.1 19.8l1.2-6.6L2.4 8.6l6.7-.9z"/></svg>`;
  }

  // ===== 星を出す =====
  let stars = [];
  function spawnStar() {
    const el = document.createElement("div");
    el.className = "star";
    el.innerHTML = drawStarSVG();
    const W = innerWidth, H = innerHeight;
    const sx = 0.15 + Math.random() * 0.7;
    const sy = 0.15 + Math.random() * 0.55;
    el.style.left = (sx * W - 32) + "px";
    el.style.top = (sy * H - 32) + "px";
    el.style.animation = "bob 1.6s ease-in-out infinite";
    app.appendChild(el);
    stars.push({ el, x: sx, y: sy });
  }

  function clearStars() {
    stars.forEach(s => s.el.remove());
    stars = [];
  }

  // ===== カメラ開始 =====
  async function startCamera() {
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "user", width: { ideal: 320 }, height: { ideal: 240 } },
        audio: false
      });
      cam.srcObject = stream;
      await cam.play();
      return true;
    } catch (e) {
      let msg = "カメラが つかえないみたい。<br>カメラの きょかを かくにんしてね。";
      if (e && e.name === "NotAllowedError")
        msg = "カメラを つかう きょかが ひつようだよ。<br>もういちど「ゆるす」を おしてね。";
      else if (e && e.name === "NotFoundError")
        msg = "カメラが みつからないよ。<br>カメラの ある きかいで あそんでね。";
      $("error-msg").innerHTML = msg;
      return false;
    }
  }

  // ===== はばたき検出（左右ゾーンの動き量） =====
  let motionAvg = 0;
  let lastBig = 0;
  const HALF_W = work.width / 2; // カメラ左右の境界
  function detectMotion() {
    wctx.drawImage(cam, 0, 0, work.width, work.height);
    const cur = wctx.getImageData(0, 0, work.width, work.height);
    let diffL = 0, diffR = 0;
    if (prevFrame) {
      const d = cur.data, p = prevFrame.data;
      for (let i = 0; i < d.length; i += 16) {
        const dd = Math.abs(d[i] - p[i]) + Math.abs(d[i+1] - p[i+1]) + Math.abs(d[i+2] - p[i+2]);
        // 閾値を上げて微細な明るさ変化を無視（感度ダウン）
        if (dd > 90) {
          if ((i >> 2) % work.width < HALF_W) diffL++;
          else diffR++;
        }
      }
    }
    prevFrame = cur;

    const diff = diffL + diffR;
    // 正規化分母を大きくして intensity が上がりにくくする
    const intensity = Math.min(1, diff / 1400);
    motionAvg = motionAvg * 0.7 + intensity * 0.3;

    // カメラ左 = 子どもの右腕 → 右移動（フロントカメラは鏡像のため）
    horzBias = diff > 20 ? (diffL - diffR) / Math.max(1, diff) : 0;

    // しきい値を上げ・クールダウンを延ばして連続誤検知を抑制
    const now = performance.now();
    if (intensity > 0.42 && now - lastBig > 250) {
      lift = Math.min(1.2, lift + 0.45);
      lastBig = now;
      flapWings();
    }
    return motionAvg;
  }

  // つばさを動かす
  let wingUp = false;
  function flapWings() {
    wingUp = !wingUp;
    const a = wingUp ? -55 : 5;
    const lw = document.querySelector(".wing-l");
    const rw = document.querySelector(".wing-r");
    if (lw) lw.style.transform = `rotate(${a}deg)`;
    if (rw) rw.style.transform = `rotate(${-a}deg)`;
  }

  // ===== メインループ =====
  let rafId = null;
  function loop() {
    if (!running) return;

    const m = detectMotion();
    flapFill.style.width = Math.round(Math.min(1, m * 2.2) * 100) + "%";

    // 物理：lift があると上昇、なければゆっくり下降
    lift *= 0.96;
    velY += (-lift * 0.018) + 0.0020;   // 重力 + 揚力
    velY *= 0.97;
    heroY += velY;

    // 画面内に収める
    if (heroY < 0.12) { heroY = 0.12; velY = 0; }
    if (heroY > 0.86) { heroY = 0.86; velY *= -0.3; }

    // 横移動：カメラ左右の動き差で操作
    velX += horzBias * 0.005;
    velX *= 0.90;
    heroX += velX;
    heroX = Math.max(0.08, Math.min(0.92, heroX));

    tilt = velX * 400 + velY * 80;

    const hero = $("hero");
    const W = innerWidth, H = innerHeight;
    hero.style.left = (heroX * 100) + "%";
    hero.style.top = (heroY * 100) + "%";
    hero.style.transform = `translate(-50%,-50%) rotate(${tilt}deg)`;

    // 雲を流す
    document.querySelectorAll(".cloud").forEach(c => {
      let x = parseFloat(c.style.left) - parseFloat(c.dataset.speed);
      if (x < -320) { x = W + 40; c.style.top = (Math.random() * H) + "px"; }
      c.style.left = x + "px";
    });

    // 星との当たり判定
    const hx = heroX * W, hy = heroY * H;
    for (let i = stars.length - 1; i >= 0; i--) {
      const s = stars[i];
      const sx = s.x * W, sy = s.y * H;
      const dist = Math.hypot(hx - sx, hy - sy);
      if (dist < 75) {
        collectStar(s, sx, sy);
        stars.splice(i, 1);
      }
    }
    // 星が少なくなったら補充
    while (stars.length < 3 && running) spawnStar();

    rafId = requestAnimationFrame(loop);
  }

  function collectStar(s, x, y) {
    s.el.remove();
    score++;
    scoreEl.textContent = score;
    const pop = document.createElement("div");
    pop.className = "pop";
    pop.textContent = "+1";
    pop.style.left = x + "px";
    pop.style.top = y + "px";
    app.appendChild(pop);
    setTimeout(() => pop.remove(), 1000);
  }

  // ===== ゲーム進行 =====
  async function beginGame() {
    startScreen.classList.add("hidden");
    errorScreen.classList.add("hidden");

    const ok = await startCamera();
    if (!ok) { errorScreen.classList.remove("hidden"); return; }

    // ウォームアップ（最初のフレーム差分を作る）
    await new Promise(r => setTimeout(r, 250));
    prevFrame = null;

    // カウントダウン
    countEl.classList.remove("hidden");
    for (const n of ["3", "2", "1", "とぶよ！"]) {
      countEl.textContent = n;
      countEl.style.fontSize = (n === "とぶよ！") ? "100px" : "200px";
      await new Promise(r => setTimeout(r, 750));
    }
    countEl.classList.add("hidden");

    // 初期化
    score = 0; timeLeft = 40;
    heroX = 0.5; heroY = 0.62; velX = 0; velY = 0; lift = 0; horzBias = 0;
    scoreEl.textContent = "0";
    timeEl.textContent = timeLeft;
    clearStars();
    for (let i = 0; i < 3; i++) spawnStar();

    hud.classList.remove("hidden");
    flapMeter.classList.remove("hidden");
    running = true;
    loop();

    timerId = setInterval(() => {
      timeLeft--;
      timeEl.textContent = timeLeft;
      if (timeLeft <= 0) endGame();
    }, 1000);
  }

  function endGame() {
    running = false;
    clearInterval(timerId);
    if (rafId) cancelAnimationFrame(rafId);
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    hud.classList.add("hidden");
    flapMeter.classList.add("hidden");
    clearStars();
    resultNum.textContent = score;
    resultScreen.classList.remove("hidden");
  }

  // ===== イベント =====
  $("start-btn").addEventListener("click", beginGame);
  $("retry-btn").addEventListener("click", () => {
    errorScreen.classList.add("hidden");
    startScreen.classList.remove("hidden");
  });
  $("again-btn").addEventListener("click", () => {
    resultScreen.classList.add("hidden");
    startScreen.classList.remove("hidden");
  });

  window.addEventListener("resize", makeClouds);
  makeClouds();
})();
</script>
</body>
</html>
